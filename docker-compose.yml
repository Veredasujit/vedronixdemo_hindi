version: "3.9"

services:
  ai-agent:
    build: .
    container_name: pipecat-agent_hindi_demo
    ports:
      - "8010:8010"
    env_file:
      - .env
    restart: unless-stopped
    command: python webrtc/webrtc_agent.py --transport webrtc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010"]
      interval: 30s
      timeout: 10s
      retries: 3